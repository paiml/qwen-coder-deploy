# =============================================================================
# ROOT CAUSE ANALYSIS
# =============================================================================

root_cause_analysis:

  BUG-HEALTH-001:
    severity: "P1 — Misleading observability"
    symptom: "apr serve --gpu reports compute_mode: cpu in /health endpoint"
    root_cause: |
      realizar/src/api/router.rs:88 checks has_gpu_model() (legacy wgpu path)
      and cached_model (batched path), but NEVER checks has_cuda_model().
      The CUDA path (PAR-111) stores model in AppState.cuda_model field,
      which the health endpoint doesn't know about.
    fix: |
      Add has_cuda_model() check to health_handler compute_mode logic.
    files:
      - "realizar/src/api/router.rs:86-94"

  BUG-HEALTH-002:
    severity: "P2 — Misleading observability"
    symptom: "apr serve APR model reports compute_mode: cpu always"
    root_cause: |
      apr-cli/src/commands/serve/handlers.rs:421 hardcodes compute_mode: "cpu".
      The APR transformer path runs on CPU (no GPU kernels for F32/APR format),
      so this is technically correct, but should reflect the actual dispatch.
    fix: "Accept compute mode from ServerConfig, pass through to health response."
    files:
      - "apr-cli/src/commands/serve/handlers.rs:421"

  GAP-GPU-001:
    severity: "P0 — Core performance gap"
    symptom: "apr serve GPU 15.3 tok/s vs llama.cpp GPU 329.7 tok/s (21.5x gap)"
    root_cause: |
      realizar's CUDA forward pass (gguf/cuda/cuda.rs forward_cuda()) calls
      CPU SIMD fused_q4k_parallel_matvec for ALL matrix multiplications.
      The CUDA executor is initialized but matmul kernels remain on CPU.

      llama.cpp uses cuBLAS GEMM kernels that run entirely on GPU VRAM,
      eliminating PCIe transfer overhead. The entire transformer forward
      pass (embed → 28 layers × {QKV, attn_out, FFN_up, FFN_down} → lm_head)
      stays on GPU.

      In contrast, realizar transfers activations CPU↔GPU per layer,
      paying PCIe latency per matmul. With 28 layers × 4 matmuls × 2
      transfers = 224 PCIe round-trips per token.
    quantified_gap: |
      - Per-token matmul time (CPU SIMD): ~60ms (28 layers, Q4K fused)
      - Per-token matmul time (cuBLAS): ~3ms (batched on GPU)
      - PCIe overhead per round-trip: ~0.1ms × 224 = ~22ms
      - Total CPU path: ~60ms/tok → 16.7 tok/s
      - Total GPU path: ~3ms/tok → 333 tok/s
    fix_path: |
      Port fused_q4k_parallel_matvec to CUDA kernel (Q4K dequant + GEMV).
      Keep all weight data GPU-resident. Eliminate PCIe transfers.
      This is a multi-week engineering effort.

  GAP-CPU-001:
    severity: "P1 — CPU matmul performance (RESOLVED as metric artifact)"
    symptom: "apr GGUF CPU 0.8 tok/s vs apr APR CPU 9.1 tok/s (11x gap, same model)"
    root_cause: |
      V2.0 benchmarks with concurrency=4 show GGUF CPU (9.4) and APR CPU (9.5)
      at parity. The v1 11x gap was a tok/s measurement artifact:
      GGUF correctly generated 1 token ("4"), APR generated ~16 tokens.
      The tok/s = total_tokens/wall_time metric rewarded verbose output.
    status: "RESOLVED — not a performance bug, metric artifact (probar#23)"

  GAP-CPU-003:
    severity: "P0 — CPU kernel performance (7.8x gap vs llama.cpp)"
    symptom: "apr CPU 9.5 tok/s vs llama.cpp CPU 73.9 tok/s (7.8x gap)"
    root_cause: |
      Five-why analysis (realizar#96):
      1. Q4K matvec kernel produces fewer tok/s on identical hardware
      2. Inner loop operates on f32 activations — dequant Q4K→f32, then FMA
         llama.cpp uses Q8_K integer inner loop (maddubs_epi16, 1-cycle throughput)
      3. fused_k.rs:177 says "Future optimization: pre-quantize activations to Q8_0"
      4. CPU was a fallback path; GPU was optimization priority
      5. Root cause: Missing two-phase compute (quantize activations → integer-only dot)
    fix_path: "realizar#96 — Q8K activation pre-quantization"
    target: "apr CPU >= 60 tok/s (within 15% of llama.cpp)"
    github_issues: ["realizar#96", "realizar#98"]

  GAP-CPU-004:
    severity: "P2 — SafeTensors CPU 36% slower than GGUF"
    symptom: "apr SafeTensors CPU 6.0 tok/s vs apr GGUF CPU 9.4 tok/s"
    root_cause: |
      SafeTensors stores F32/F16, runtime Q4K conversion at startup.
      Post-conversion tensors likely dispatch to F32 matmul instead of
      fused_q4k_parallel_matvec. Tensor QuantType not set correctly after conversion.
    fix_path: "realizar#99 — fix F32 fallback dispatch after Q4K conversion"
    target: "SafeTensors CPU within 10% of GGUF CPU"
    github_issue: "realizar#99"

  GAP-GPU-002:
    severity: "P1 — GPU VRAM residency (2.1x gap vs llama.cpp)"
    symptom: "apr GPU 108 tok/s vs llama.cpp GPU 225 tok/s (2.1x gap)"
    root_cause: |
      Five-why analysis (realizar#97):
      1. Lower token throughput despite same GPU
      2. Log: "Pre-uploaded 0 MB weights to GPU" — weights not VRAM-resident
      3. CUDA path uses on-demand dispatch — per-matmul PCIe transfers
      4. CUDA integration is new; no persistent GPU weight store
      5. Root cause: Missing persistent VRAM weight residency
    fix_path: "realizar#97 — cudaMalloc all Q4K weights at model load"
    target: "apr GPU >= 180 tok/s (80% of llama.cpp)"
    github_issue: "realizar#97"

  GAP-CPU-002:
    severity: "RESOLVED — llama.cpp CPU anomaly"
    symptom: "llama.cpp CPU 1.4 tok/s — suspiciously slow for 96-core machine"
    root_cause: |
      llama.cpp was launched with --threads 4. V2.0 benchmarks with proper
      thread count show 73.9 tok/s — now the reference target for apr CPU.
    status: "RESOLVED — proper --threads 48 in v2.0 benchmarks"

