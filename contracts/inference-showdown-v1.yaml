# =============================================================================
# ROOT CAUSE ANALYSIS
# =============================================================================

root_cause_analysis:

  BUG-HEALTH-001:
    severity: "P1 — Misleading observability"
    symptom: "apr serve --gpu reports compute_mode: cpu in /health endpoint"
    root_cause: |
      realizar/src/api/router.rs:88 checks has_gpu_model() (legacy wgpu path)
      and cached_model (batched path), but NEVER checks has_cuda_model().
      The CUDA path (PAR-111) stores model in AppState.cuda_model field,
      which the health endpoint doesn't know about.
    fix: |
      Add has_cuda_model() check to health_handler compute_mode logic.
    files:
      - "realizar/src/api/router.rs:86-94"

  BUG-HEALTH-002:
    severity: "P2 — Misleading observability"
    symptom: "apr serve APR model reports compute_mode: cpu always"
    root_cause: |
      apr-cli/src/commands/serve/handlers.rs:421 hardcodes compute_mode: "cpu".
      The APR transformer path runs on CPU (no GPU kernels for F32/APR format),
      so this is technically correct, but should reflect the actual dispatch.
    fix: "Accept compute mode from ServerConfig, pass through to health response."
    files:
      - "apr-cli/src/commands/serve/handlers.rs:421"

  GAP-GPU-001:
    severity: "P0 — Core performance gap"
    symptom: "apr serve GPU 15.3 tok/s vs llama.cpp GPU 329.7 tok/s (21.5x gap)"
    root_cause: |
      realizar's CUDA forward pass (gguf/cuda/cuda.rs forward_cuda()) calls
      CPU SIMD fused_q4k_parallel_matvec for ALL matrix multiplications.
      The CUDA executor is initialized but matmul kernels remain on CPU.

      llama.cpp uses cuBLAS GEMM kernels that run entirely on GPU VRAM,
      eliminating PCIe transfer overhead. The entire transformer forward
      pass (embed → 28 layers × {QKV, attn_out, FFN_up, FFN_down} → lm_head)
      stays on GPU.

      In contrast, realizar transfers activations CPU↔GPU per layer,
      paying PCIe latency per matmul. With 28 layers × 4 matmuls × 2
      transfers = 224 PCIe round-trips per token.
    quantified_gap: |
      - Per-token matmul time (CPU SIMD): ~60ms (28 layers, Q4K fused)
      - Per-token matmul time (cuBLAS): ~3ms (batched on GPU)
      - PCIe overhead per round-trip: ~0.1ms × 224 = ~22ms
      - Total CPU path: ~60ms/tok → 16.7 tok/s
      - Total GPU path: ~3ms/tok → 333 tok/s
    fix_path: |
      Port fused_q4k_parallel_matvec to CUDA kernel (Q4K dequant + GEMV).
      Keep all weight data GPU-resident. Eliminate PCIe transfers.
      This is a multi-week engineering effort.

  GAP-CPU-001:
    severity: "P1 — CPU matmul performance"
    symptom: "apr GGUF CPU 0.8 tok/s vs apr APR CPU 9.1 tok/s (11x gap, same model)"
    root_cause: |
      GGUF CPU path uses realizar's generate_with_cache() which reconstructs
      the full attention computation each token. APR CPU path uses the
      optimized transformer forward with pre-built layer structures.
      The GGUF→OwnedQuantizedModel path may have inefficient memory access
      patterns compared to the APR transformer path.
    fix_path: |
      Profile GGUF CPU forward path to identify specific bottleneck.
      Likely candidates: attention recomputation, memory allocation per layer,
      or missing AVX2 dispatch in the CPU-only GGUF path.

  GAP-CPU-002:
    severity: "P2 — llama.cpp CPU anomaly"
    symptom: "llama.cpp CPU 1.4 tok/s — suspiciously slow for 96-core machine"
    root_cause: |
      llama.cpp was launched with --threads 4 (from nproc expansion issue
      or explicit flag). With 96 cores available, --threads 48 would be
      more appropriate. Additionally, llama.cpp's CPU backend uses its own
      Q4_K kernels which may not use AVX-512 on this Xeon.
    fix_path: "Re-benchmark with --threads 48 or $(nproc)."

