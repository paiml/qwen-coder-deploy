# =============================================================================
# IMMEDIATE FIXES (this session)
# =============================================================================

immediate_fixes:

  FIX-001:
    name: "Health endpoint reports correct compute_mode for CUDA"
    bug: "BUG-HEALTH-001"
    file: "realizar/src/api/router.rs"
    change: |
      Add has_cuda_model() check to compute_mode logic:
        #[cfg(feature = "gpu")]
        let compute_mode = if state.has_cuda_model()
            || state.has_gpu_model()
            || state.cached_model.is_some()
        {
            "gpu"
        } else {
            "cpu"
        };

  FIX-002:
    name: "llama.cpp CPU benchmark with correct thread count"
    bug: "GAP-CPU-002"
    change: |
      Re-run llama.cpp CPU benchmark with --threads 48 to get
      fair comparison on 96-core machine.

  FIX-003:
    name: "Verify CUDA inference path is actually dispatching to GPU"
    bug: "GAP-GPU-001"
    change: |
      Add REALIZE_TRACE=1 to apr serve --gpu and check logs for
      "try_cuda_generate" vs "try_quantized_generate" dispatch.
      If CUDA path active, the 15 tok/s IS the current ceiling
      (CPU matmul + PCIe overhead). If not, there's a dispatch bug.

