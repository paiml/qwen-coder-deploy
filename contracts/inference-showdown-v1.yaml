# =============================================================================
# IMPLEMENTATION ROADMAP (priority order)
# =============================================================================

roadmap:

  PHASE-1:
    name: "Fix measurement tooling (probar)"
    priority: "P0 — must fix before optimizing"
    issues:
      - id: "probar#23"
        title: "tok/s metric misleading for cross-backend comparison"
        deliverables:
          - "avg_tok_per_req in LoadTestResult"
          - "itl_ms (inter-token latency) = (latency - ttft) / (tokens - 1)"
          - "decode_tok_per_sec = 1000 / itl_ms"
          - "Console and markdown output include new columns"
        verify: "Re-run benchmarks, confirm apr GGUF and APR show comparable decode_tok_per_sec"
      - id: "probar#24"
        title: "SSE streaming for TPOT measurement"
        deliverables:
          - "stream: true in ChatRequest"
          - "SSE parser for data: {...}\\n\\n events"
          - "Per-token timestamps for TPOT P50/P90/P95/P99"
        verify: "TPOT > 0ms when server supports streaming"

  PHASE-2:
    name: "CPU kernel optimization (realizar)"
    priority: "P0 — 7.8x gap is the largest"
    issues:
      - id: "realizar#96"
        title: "Pre-quantize activations to Q8K for 8x throughput"
        deliverables:
          - "quantize_row_q8_k() — one-time per matmul"
          - "fused_q4k_q8k_dot_avx2() — integer-only inner loop"
          - "Wire up AVX-512 VNNI path (already exists as V2)"
          - "Amortize quantization in generic_matvec.rs"
        verify: "apr CPU >= 60 tok/s (probador llm load --concurrency 1 --duration 30s)"
        target: "Within 15% of llama.cpp (73.9 tok/s)"
      - id: "realizar#98"
        title: "Replace Rayon with atomic work-stealing + L1 tiling"
        blocked_by: "realizar#96"
        deliverables:
          - "AtomicUsize work-stealing dispatch (10-50ns vs 1-5us)"
          - "16-row tile size (13KB, fits L1)"
          - "Pre-allocated thread pool at model load"
        verify: "Dispatch overhead < 1% of matmul compute time"

  PHASE-3:
    name: "GPU optimization (realizar)"
    priority: "P1 — 2.1x gap"
    issues:
      - id: "realizar#97"
        title: "Persistent VRAM weight residency for 2x throughput"
        deliverables:
          - "cudaMalloc + cudaMemcpy all Q4K weights at model load"
          - "Forward pass reads from VRAM pointers (zero PCIe)"
          - "cudaFree on server shutdown"
        verify: "apr GPU >= 180 tok/s, nvidia-smi shows ~1.1GB allocated"
        target: "Within 20% of llama.cpp (224.8 tok/s)"

  PHASE-4:
    name: "SafeTensors CPU dispatch fix (realizar)"
    priority: "P2 — 36% gap"
    issues:
      - id: "realizar#99"
        title: "Fix F32 fallback after Q4K conversion"
        deliverables:
          - "Verify tensor QuantType after SafeTensors→Q4K conversion"
          - "Fix dispatch to use fused_q4k_parallel_matvec"
        verify: "SafeTensors CPU within 10% of GGUF CPU"

