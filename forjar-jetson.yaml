version: "1.0"
name: qwen-coder-deploy-jetson
description: "Deploy Qwen2.5-Coder-1.5B-Instruct across apr serve (GGUF), ollama, llama.cpp — Jetson Orin"

# Cross-compile pipeline: Intel builds aarch64 binary → deploys to Jetson
# See: https://github.com/paiml/forjar/issues/33 (native cross-compile resource)

params:
  gguf_model: "/home/noah/models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf"
  apr_cross_bin: "/tmp/cross-jetson/aarch64-unknown-linux-gnu/release/apr"
  apr_target: "aarch64-unknown-linux-gnu"
  apr_features: "hf-hub,safetensors-compare,inference,cuda,zram"

machines:
  intel:
    hostname: intel
    addr: 192.168.50.100
    user: noah
    arch: x86_64
    transport: ssh

  jetson:
    hostname: jetson
    addr: 192.168.50.53
    user: noah
    arch: aarch64
    transport: ssh

resources:
  # -- Phase 1: Cross-compile on Intel (192 threads, fast NVMe) ----------------

  sync-trueno:
    type: task
    machine: intel
    command: "cd ~/src/trueno && git fetch origin && git checkout gh-131-deferred-scale && git reset --hard origin/gh-131-deferred-scale"
    completion_check: "cd ~/src/trueno && git rev-parse HEAD"

  sync-realizar:
    type: task
    machine: intel
    command: "cd ~/src/realizar && git fetch origin && git checkout gh-129-jetson-ptx-fix && git reset --hard origin/gh-129-jetson-ptx-fix"
    completion_check: "cd ~/src/realizar && git branch --show-current | grep -q gh-129-jetson-ptx-fix"

  sync-aprender:
    type: task
    machine: intel
    command: "cd ~/src/aprender && git fetch origin && git checkout gh-129-jetson-support && git reset --hard origin/gh-129-jetson-support"
    completion_check: "cd ~/src/aprender && git branch --show-current | grep -q gh-129-jetson-support"

  apr-cross-compile:
    type: task
    machine: intel
    command: |
      cd ~/src/aprender &&
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
      CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc \
      cargo +nightly build --release \
        --target {{params.apr_target}} \
        --target-dir /tmp/cross-jetson \
        -p apr-cli \
        --no-default-features \
        --features "{{params.apr_features}}"
    completion_check: "test -x {{params.apr_cross_bin}}"
    depends_on: [sync-trueno, sync-realizar, sync-aprender]
    timeout: 1800

  # -- Phase 2: Deploy binary to Jetson ----------------------------------------
  # Two-hop: Intel → (scp via local) → Jetson
  # Intel cannot reach Jetson directly (no route), so we relay through localhost.

  apr-stop:
    type: task
    machine: jetson
    command: "pkill -f '[a]pr serve' 2>/dev/null; sleep 2; true"
    completion_check: "! pgrep -f 'apr serve' >/dev/null 2>&1"
    depends_on: [apr-cross-compile]

  apr-deploy:
    type: task
    machine: intel
    command: "scp {{params.apr_cross_bin}} noah@192.168.50.53:~/.cargo/bin/apr"
    completion_check: "ssh noah@192.168.50.53 'test -x ~/.cargo/bin/apr'"
    depends_on: [apr-stop]
    timeout: 120

  # -- Phase 3: Prerequisites on Jetson ----------------------------------------

  model-gguf:
    type: task
    machine: jetson
    command: "test -f {{params.gguf_model}}"
    completion_check: "test -f {{params.gguf_model}}"

  llamacpp-build:
    type: task
    machine: jetson
    command: |
      set -e
      if [ ! -d /home/noah/src/llama.cpp ]; then
        git clone --depth 1 https://github.com/ggerganov/llama.cpp.git /home/noah/src/llama.cpp
      fi
      mkdir -p /home/noah/src/llama.cpp/build
      cd /home/noah/src/llama.cpp/build
      cmake .. -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=87
      cmake --build . --target llama-server -j$(nproc)
    completion_check: "test -x /home/noah/src/llama.cpp/build/bin/llama-server"
    timeout: 1200

  ollama-install:
    type: task
    machine: jetson
    command: "/usr/local/bin/ollama --version || curl -fsSL https://ollama.com/install.sh | sh"
    completion_check: "test -x /usr/local/bin/ollama"
    timeout: 300

  ollama-default-stop:
    type: task
    machine: jetson
    command: "sudo systemctl stop ollama.service 2>/dev/null || true"
    completion_check: "! systemctl is-active --quiet ollama.service"
    depends_on: [ollama-install]

  ollama-model:
    type: task
    machine: jetson
    command: "OLLAMA_HOST=0.0.0.0:8082 ollama serve &>/dev/null & sleep 3; OLLAMA_HOST=http://127.0.0.1:8082 ollama pull qwen2.5-coder:1.5b-instruct; pkill -f 'ollama serve' 2>/dev/null || true"
    completion_check: "OLLAMA_HOST=http://127.0.0.1:8082 ollama list 2>/dev/null | grep -q 'qwen2.5-coder:1.5b' || ollama list 2>/dev/null | grep -q 'qwen2.5-coder:1.5b'"
    depends_on: [ollama-default-stop]
    timeout: 600

  # -- Phase 4: Start GPU services ---------------------------------------------
  # Ports: 8081 apr/GGUF, 8082 ollama, 8083 llama.cpp

  apr-gguf-gpu:
    type: task
    machine: jetson
    command: "pkill -f '[a]pr serve.*8081' 2>/dev/null || true; sleep 2; REALIZAR_VERBOSE=1 SKIP_PARITY_GATE=1 CUBLAS_PREFILL=1 REALIZR_FREE_CPU_WEIGHTS=1 REALIZR_MAX_SEQ_LEN=2048 nohup apr serve run {{params.gguf_model}} --gpu --host 0.0.0.0 --port 8081 --skip-contract > /tmp/apr-gguf-gpu.log 2>&1 & sleep 15; curl -sf http://127.0.0.1:8081/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8081/health 2>/dev/null | grep -q '\"inference\":\"ok\"'"
    depends_on: [model-gguf, apr-deploy]

  ollama-gpu:
    type: task
    machine: jetson
    command: "pkill -f 'ollama serve' 2>/dev/null || true; sleep 1; OLLAMA_HOST=0.0.0.0:8082 nohup ollama serve > /tmp/ollama-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8082/api/tags >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8082/api/tags >/dev/null 2>&1"
    depends_on: [ollama-model, ollama-default-stop]

  llamacpp-gpu:
    type: task
    machine: jetson
    command: "pkill -f 'llama-server.*8083' 2>/dev/null || true; sleep 1; nohup /home/noah/src/llama.cpp/build/bin/llama-server --model {{params.gguf_model}} --host 0.0.0.0 --port 8083 --n-gpu-layers 99 --ctx-size 4096 --threads 4 > /tmp/llamacpp-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8083/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8083/health >/dev/null 2>&1"
    depends_on: [llamacpp-build, model-gguf]

policy:
  failure: continue_independent
  tripwire: false
  lock_file: true
