version: "1.0"
name: qwen-coder-deploy-jetson
description: "Deploy Qwen2.5-Coder-1.5B-Instruct across apr serve (GGUF), ollama, llama.cpp — Jetson Orin (dedicated load testing)"

# Prerequisites (managed by ../infra/machines/jetson/forjar.yaml):
#   - build-essential, cmake, pkg-config, libssl-dev (build-deps resource)
#   - Rust toolchain (rustup-installer resource)
#   - CUDA toolkit (cuda-toolkit / nvidia-jetpack resource)
#   - apr binary: cross-compile via `cd ../infra && make -f machines/jetson/Makefile apr-deploy`
#
# Model sync (one-time):
#   scp ~/models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf jetson:~/models/

params:
  gguf_model: "/home/noah/models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf"

machines:
  jetson:
    hostname: jetson
    addr: 192.168.50.53
    user: noah
    arch: aarch64
    transport: ssh

resources:
  # -- Prerequisites (verify only — provisioning is in ../infra) ---------------

  model-gguf:
    type: task
    machine: jetson
    command: "test -f {{params.gguf_model}}"
    completion_check: "test -f {{params.gguf_model}}"

  apr-check:
    type: task
    machine: jetson
    command: "which apr && apr --version"
    completion_check: "which apr >/dev/null 2>&1"

  llamacpp-build:
    type: task
    machine: jetson
    command: |
      set -e
      if [ ! -d /home/noah/src/llama.cpp ]; then
        git clone --depth 1 https://github.com/ggerganov/llama.cpp.git /home/noah/src/llama.cpp
      fi
      mkdir -p /home/noah/src/llama.cpp/build
      cd /home/noah/src/llama.cpp/build
      cmake .. -DGGML_CUDA=ON -DCMAKE_CUDA_ARCHITECTURES=87
      cmake --build . --target llama-server -j$(nproc)
    completion_check: "test -x /home/noah/src/llama.cpp/build/bin/llama-server"
    timeout: 1200

  ollama-install:
    type: task
    machine: jetson
    command: "/usr/local/bin/ollama --version || curl -fsSL https://ollama.com/install.sh | sh"
    completion_check: "test -x /usr/local/bin/ollama"
    timeout: 300

  ollama-default-stop:
    type: task
    machine: jetson
    command: "sudo systemctl stop ollama.service 2>/dev/null || true"
    completion_check: "! systemctl is-active --quiet ollama.service"
    depends_on: [ollama-install]

  ollama-model:
    type: task
    machine: jetson
    command: "OLLAMA_HOST=0.0.0.0:8082 ollama serve &>/dev/null & sleep 3; OLLAMA_HOST=http://127.0.0.1:8082 ollama pull qwen2.5-coder:1.5b-instruct; pkill -f 'ollama serve' 2>/dev/null || true"
    completion_check: "OLLAMA_HOST=http://127.0.0.1:8082 ollama list 2>/dev/null | grep -q 'qwen2.5-coder:1.5b' || ollama list 2>/dev/null | grep -q 'qwen2.5-coder:1.5b'"
    depends_on: [ollama-default-stop]
    timeout: 600

  # -- GPU Services -----------------------------------------------------------
  # Ports: 8081 apr/GGUF, 8082 ollama, 8083 llama.cpp

  apr-gguf-gpu:
    type: task
    machine: jetson
    command: "pkill -f 'apr serve.*8081' 2>/dev/null || true; sleep 2; SKIP_PARITY_GATE=1 nohup apr serve run {{params.gguf_model}} --host 0.0.0.0 --port 8081 --skip-contract > /tmp/apr-gguf-gpu.log 2>&1 & sleep 15; curl -sf http://127.0.0.1:8081/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8081/health >/dev/null 2>&1"
    depends_on: [model-gguf, apr-check]

  ollama-gpu:
    type: task
    machine: jetson
    command: "pkill -f 'ollama serve' 2>/dev/null || true; sleep 1; OLLAMA_HOST=0.0.0.0:8082 nohup ollama serve > /tmp/ollama-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8082/api/tags >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8082/api/tags >/dev/null 2>&1"
    depends_on: [ollama-model, ollama-default-stop]

  llamacpp-gpu:
    type: task
    machine: jetson
    command: "pkill -f 'llama-server.*8083' 2>/dev/null || true; sleep 1; nohup /home/noah/src/llama.cpp/build/bin/llama-server --model {{params.gguf_model}} --host 0.0.0.0 --port 8083 --n-gpu-layers 99 --ctx-size 4096 --threads 4 > /tmp/llamacpp-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8083/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8083/health >/dev/null 2>&1"
    depends_on: [llamacpp-build, model-gguf]

policy:
  failure: continue_independent
  tripwire: false
  lock_file: true
