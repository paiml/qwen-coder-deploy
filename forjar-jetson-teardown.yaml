version: "1.0"
name: qwen-coder-deploy-jetson-teardown
description: "Stop all Qwen inference services on Jetson Orin"

machines:
  jetson:
    hostname: jetson
    addr: 192.168.50.53
    user: noah
    arch: aarch64
    transport: ssh

resources:
  stop-apr:
    type: task
    machine: jetson
    command: "pkill -f 'apr serve' 2>/dev/null || true"
    completion_check: "! pgrep -f 'apr serve' >/dev/null 2>&1"

  stop-ollama:
    type: task
    machine: jetson
    command: "pkill -f 'ollama serve' 2>/dev/null || true"
    completion_check: "! pgrep -f 'ollama serve' >/dev/null 2>&1"

  stop-llamacpp:
    type: task
    machine: jetson
    command: "pkill -f 'llama-server' 2>/dev/null || true"
    completion_check: "! pgrep -f 'llama-server' >/dev/null 2>&1"

policy:
  failure: continue_independent
