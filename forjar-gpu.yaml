version: "1.0"
name: qwen-coder-deploy-gpu
description: "Deploy Qwen2.5-Coder-1.5B-Instruct across apr serve (GGUF/SafeTensors/APR), ollama, llama.cpp - GPU (RTX 4090)"

params:
  gguf_model: "/home/noah/models/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf"
  safetensors_model: "/home/noah/models/qwen2.5-coder-1.5b-instruct-safetensors/model.safetensors"
  apr_model: "/home/noah/models/qwen2.5-coder-1.5b-instruct-q4k.apr"

machines:
  gpu:
    hostname: noah-Lambda-Vector
    addr: 127.0.0.1
    user: noah
    arch: x86_64
    transport: local

resources:
  # -- Prerequisites ----------------------------------------------------------

  # CUDA profiling tools (nsys for timeline, ncu for per-kernel metrics)
  # Lambda's nsight-systems bundles libSshClient compiled against libssh 0.10,
  # but Ubuntu 22.04 ships libssh 0.9.6 (missing LIBSSH_4_9_0 symbol).
  # Fix: build libssh 0.10 from source and symlink nsight's libssh.so to it.
  nsight-tools:
    type: task
    machine: gpu
    command: |
      sudo apt-get install -y nsight-systems nsight-compute &&
      if /usr/lib/nsight-systems/host-linux-x64/QdstrmImporter --version 2>&1 | grep -q 'LIBSSH_4_9_0'; then
        echo "Fixing nsight libssh version mismatch..."
        cd /tmp &&
        rm -rf libssh-0.10 &&
        git clone --depth 1 --branch libssh-0.10.6 https://git.libssh.org/projects/libssh.git libssh-0.10 &&
        mkdir -p libssh-0.10/build && cd libssh-0.10/build &&
        cmake .. -DWITH_EXAMPLES=OFF -DBUILD_SHARED_LIBS=ON &&
        make -j$(nproc) &&
        sudo cp lib/libssh.so.4.9.6 /usr/local/lib/ &&
        sudo ln -sf libssh.so.4.9.6 /usr/local/lib/libssh.so.4 &&
        sudo ldconfig &&
        sudo bash -c 'cd /usr/lib/nsight-systems/host-linux-x64 && rm -f libssh.so && ln -sf /usr/local/lib/libssh.so.4 libssh.so'
      fi
    completion_check: "which nsys && which ncu && /usr/lib/nsight-systems/host-linux-x64/QdstrmImporter --version 2>&1 | grep -q 'NVIDIA'"
    timeout: 600

  llamacpp-build:
    type: task
    machine: gpu
    command: "cmake --build /home/noah/src/llama.cpp/build --target llama-server -j$(nproc)"
    completion_check: "test -x /home/noah/src/llama.cpp/build/bin/llama-server"
    output_artifacts:
      - "/home/noah/src/llama.cpp/build/bin/llama-server"
    timeout: 600

  model-gguf:
    type: task
    machine: gpu
    command: "test -f {{params.gguf_model}} || { echo 'Missing GGUF - run: apr pull hf://Qwen/Qwen2.5-Coder-1.5B-Instruct-GGUF/qwen2.5-coder-1.5b-instruct-q4_k_m.gguf'; exit 1; }"
    completion_check: "test -f {{params.gguf_model}}"

  model-safetensors:
    type: task
    machine: gpu
    command: "test -f {{params.safetensors_model}} || { echo 'Missing SafeTensors - run: apr pull hf://Qwen/Qwen2.5-Coder-1.5B-Instruct'; exit 1; }"
    completion_check: "test -f {{params.safetensors_model}}"

  model-apr:
    type: task
    machine: gpu
    command: "test -f {{params.apr_model}} || { echo 'Missing APR - run: apr import {{params.gguf_model}} --preserve-q4k'; exit 1; }"
    completion_check: "test -f {{params.apr_model}}"

  ollama-model:
    type: task
    machine: gpu
    command: "ollama pull qwen2.5-coder:1.5b-instruct"
    completion_check: "ollama list 2>/dev/null | grep -q 'qwen2.5-coder:1.5b-instruct'"

  ollama-default-stop:
    type: task
    machine: gpu
    command: "sudo systemctl stop ollama.service 2>/dev/null || true"
    completion_check: "! systemctl is-active --quiet ollama.service"
    depends_on: [ollama-model]

  # -- GPU Services -----------------------------------------------------------
  # Ports: 8081 apr/GGUF, 8082 ollama, 8083 llama.cpp, 8084 apr/APR, 8085 apr/SafeTensors

  realizr-build:
    type: task
    machine: gpu
    command: "cd /home/noah/src/realizar && CARGO_TARGET_DIR=/mnt/nvme-raid0/targets/realizar cargo build --release --features cuda"
    completion_check: "test -x /mnt/nvme-raid0/targets/realizar/release/realizar"
    timeout: 600

  apr-gguf-gpu:
    type: task
    machine: gpu
    command: "pkill -f 'realizar serve.*8081' 2>/dev/null || true; sleep 2; nohup /mnt/nvme-raid0/targets/realizar/release/realizar serve --model {{params.gguf_model}} --host 0.0.0.0 --port 8081 --gpu --openai-api > /tmp/apr-gguf-gpu.log 2>&1 & sleep 12; curl -sf http://127.0.0.1:8081/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8081/health >/dev/null 2>&1"
    depends_on: [realizr-build, model-gguf]

  ollama-gpu:
    type: task
    machine: gpu
    command: "pkill -f 'ollama serve' 2>/dev/null || true; sleep 1; OLLAMA_HOST=0.0.0.0:8082 nohup /usr/local/bin/ollama serve > /tmp/ollama-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8082/api/tags >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8082/api/tags >/dev/null 2>&1"
    depends_on: [ollama-model, ollama-default-stop]

  llamacpp-gpu:
    type: task
    machine: gpu
    command: "pkill -f 'llama-server.*8083' 2>/dev/null || true; sleep 1; LD_LIBRARY_PATH=/home/noah/src/llama.cpp/build/bin nohup /home/noah/src/llama.cpp/build/bin/llama-server --model {{params.gguf_model}} --host 0.0.0.0 --port 8083 --n-gpu-layers 99 --flash-attn on --ctx-size 4096 --threads 4 > /tmp/llamacpp-gpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8083/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8083/health >/dev/null 2>&1"
    depends_on: [llamacpp-build, model-gguf]

  apr-apr-gpu:
    type: task
    machine: gpu
    command: "pkill -f 'apr serve.*8084' 2>/dev/null || true; sleep 2; SKIP_PARITY_GATE=1 nohup apr serve run {{params.apr_model}} --port 8084 --gpu --skip-contract > /tmp/apr-apr-gpu.log 2>&1 & sleep 12; curl -sf http://127.0.0.1:8084/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8084/health >/dev/null 2>&1"
    depends_on: [model-apr]

  apr-safetensors-gpu:
    type: task
    machine: gpu
    command: "pkill -f 'apr serve.*8085' 2>/dev/null || true; sleep 2; nohup apr serve run {{params.safetensors_model}} --port 8085 --gpu > /tmp/apr-safetensors-gpu.log 2>&1 & sleep 45; curl -sf http://127.0.0.1:8085/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8085/health >/dev/null 2>&1"
    depends_on: [model-safetensors]

  # -- CPU Services -----------------------------------------------------------
  # Ports: 8091 apr/GGUF, 8092 ollama, 8093 llama.cpp, 8094 apr/APR, 8095 apr/SafeTensors

  apr-gguf-cpu:
    type: task
    machine: gpu
    command: "pkill -f 'apr serve.*8091' 2>/dev/null || true; sleep 2; nohup apr serve run {{params.gguf_model}} --port 8091 --no-gpu --skip-contract > /tmp/apr-gguf-cpu.log 2>&1 & sleep 12; curl -sf http://127.0.0.1:8091/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8091/health >/dev/null 2>&1"
    depends_on: [model-gguf]

  ollama-cpu:
    type: task
    machine: gpu
    command: "CUDA_VISIBLE_DEVICES= OLLAMA_HOST=0.0.0.0:8092 nohup /usr/local/bin/ollama serve > /tmp/ollama-cpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8092/api/tags >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8092/api/tags >/dev/null 2>&1"
    depends_on: [ollama-model, ollama-default-stop]

  llamacpp-cpu:
    type: task
    machine: gpu
    command: "pkill -f 'llama-server.*8093' 2>/dev/null || true; sleep 1; nohup /home/noah/src/llama.cpp/build/bin/llama-server --model {{params.gguf_model}} --host 0.0.0.0 --port 8093 --n-gpu-layers 0 --ctx-size 4096 --threads $(nproc) > /tmp/llamacpp-cpu.log 2>&1 & sleep 5; curl -sf http://127.0.0.1:8093/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8093/health >/dev/null 2>&1"
    depends_on: [llamacpp-build, model-gguf]

  apr-apr-cpu:
    type: task
    machine: gpu
    command: "pkill -f 'apr serve.*8094' 2>/dev/null || true; sleep 2; nohup apr serve run {{params.apr_model}} --port 8094 --no-gpu --skip-contract > /tmp/apr-apr-cpu.log 2>&1 & sleep 12; curl -sf http://127.0.0.1:8094/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8094/health >/dev/null 2>&1"
    depends_on: [model-apr]

  apr-safetensors-cpu:
    type: task
    machine: gpu
    command: "pkill -f 'apr serve.*8095' 2>/dev/null || true; sleep 2; nohup apr serve run {{params.safetensors_model}} --port 8095 --no-gpu > /tmp/apr-safetensors-cpu.log 2>&1 & sleep 45; curl -sf http://127.0.0.1:8095/health >/dev/null"
    completion_check: "curl -sf http://127.0.0.1:8095/health >/dev/null 2>&1"
    depends_on: [model-safetensors]

policy:
  failure: continue_independent
  tripwire: false
  lock_file: true
